<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Demo</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class= "mt-20 flex flex-wrap border-2 rounded mx-52">
        <div class="w-full bg-gradient-to-r from-sky-500 to-indigo-500 text-white text-xl h-20 flex justify-center items-center font-bold">Quote</div>
        <div class = "text-center mt-6 w-full">
            <h3 class="text-lg font-semibold">Stay up to date with the Latest!</h3>
            <p>Subscribe to our newsletter for the latest news straight into your inbox.</p>
            <form class="flex flex-wrap">
                <input placeholder="your@email.com" class="w-full mx-8 bg-slate-200 text-center placeholder:text-slate-400 h-10 rounded-md my-4" type="email" name="email">
                <button class="bg-blue-500 w-full text-white font-bold py-2 px-4 rounded-md">Subscribe Now!</button>
            </form>
            <p class=" mt-6 mb-3 text-sm text-slate-500">We value your privacy</p>
        </div>
    </div>
</body>
</html>
